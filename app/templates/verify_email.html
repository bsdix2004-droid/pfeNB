<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Email Verification – Scanalyze</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .card {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 420px;
            text-align: center;
        }

        .icon {
            font-size: 60px;
            margin-bottom: 20px;
        }

        h2 {
            color: #1a1a2e;
            margin-bottom: 12px;
            font-size: 24px;
        }

        p {
            color: #666;
            margin-bottom: 28px;
            font-size: 14px;
            line-height: 1.6;
        }

        .btn {
            display: inline-block;
            padding: 13px 32px;
            background: #4F46E5;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            transition: background 0.2s;
        }

        .btn:hover { background: #3730a3; }

        .error {
            color: #991b1b;
            background: #fee2e2;
            padding: 12px;
            border-radius: 8px;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="card">
        {% if success %}
            <div class="icon">✅</div>
            <h2>Email Verified!</h2>
            <p>Your email has been verified successfully.<br>You can now log in to your account.</p>
            <a href="{{ frontend_url }}/login" class="btn">Go to Login</a>
        {% else %}
            <div class="icon">❌</div>
            <h2>Verification Failed</h2>
            <p class="error">{{ error_message }}</p>
        {% endif %}
    </div>
</body>
</html>
